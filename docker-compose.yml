services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: foundermatch
      POSTGRES_USER: foundermatch
      POSTGRES_PASSWORD: foundermatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundermatch -d foundermatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://foundermatch:foundermatch@postgres:5432/foundermatch
      SECRET_KEY: dev-secret-change-me
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
